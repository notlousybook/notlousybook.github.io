<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Repository detail page for notlousybook projects.">
  <title>Repository — notlousybook</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="../index.html" aria-label="notlousybook home">
        <span class="brand__mark">NB</span>
        <span class="brand__text">notlousybook</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="../index.html">Home</a>
        <a href="../projects.html">Projects</a>
        <a href="../downloads.html">Downloads</a>
        <a href="../youtube.html">YouTube</a>
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <div class="site-header__actions">
        <a class="button button--ghost button--small" href="https://github.com/notlousybook" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </header>

  <main class="container repo-shell">
    <a class="back-link" href="../projects.html">← Back to Projects</a>
    <section class="glass-card repo-hero">
      <div>
        <p class="eyebrow">GitHub repository</p>
        <h1 id="repo-title" class="heading-lg">Loading…</h1>
        <p id="repo-desc" class="lede"></p>
        <div id="repo-meta" class="chips"></div>
        <div id="repo-actions" class="hero-actions"></div>
      </div>
      <div id="repo-cover" class="repo-hero__media"></div>
    </section>

    <section class="glass-card content-card prose">
      <div id="readme">Loading README…</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <p class="footer-title">notlousybook</p>
        <p class="footer-copy">Detailed repository views powered by GitHub README content.</p>
      </div>
      <div class="footer-links">
        <a href="../projects.html">Projects</a>
        <a href="../downloads.html">Downloads</a>
        <a href="../youtube.html">YouTube</a>
        <a href="../contact.html">Contact</a>
      </div>
    </div>
    <div class="container footer-note">© <span data-year></span> notlousybook</div>
  </footer>

  <script>const REPO_NAME = new URLSearchParams(location.search).get('repo') || 'DeepSeek-Desktop';</script>
  <script src="../assets/js/repo-view.js"></script>
