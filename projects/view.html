<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Repository — notlousybook</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="../index.html">notlousybook</a>
      <nav class="site-nav">
        <a href="../index.html">Home</a>
        <a href="../projects.html">Projects</a>
        <a href="../downloads.html">Downloads</a>
        <a href="../youtube.html">YouTube</a>
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container repo-view">
    <p><a href="../projects.html">← Back to Projects</a></p>
    <h1 id="repo-title">Loading…</h1>
    <p id="repo-desc"></p>
    <div id="repo-meta" class="meta" style="margin-bottom:18px;color:var(--muted)"></div>
    <hr />
    <div id="readme">Loading README…</div>
  </main>

  <footer class="site-footer container">© notlousybook</footer>

  <script>
    async function loadRepo(){
      const params = new URLSearchParams(location.search);
      const repo = params.get('repo');
      const readmeEl = document.getElementById('readme');
      const titleEl = document.getElementById('repo-title');
      const descEl = document.getElementById('repo-desc');
      const metaEl = document.getElementById('repo-meta');
      if(!repo){ readmeEl.textContent = 'No repo specified.'; return; }
      try{
        const apiRes = await fetch(`https://api.github.com/repos/notlousybook/${repo}`);
        if(!apiRes.ok){ titleEl.textContent = repo; descEl.textContent = 'Repository not found or private.'; readmeEl.textContent = '';
          return; }
        const data = await apiRes.json();
        document.title = `${data.full_name} — notlousybook`;
        titleEl.innerHTML = `<a href="${data.html_url}" target="_blank" rel="noopener">${data.full_name}</a>`;
        descEl.textContent = data.description || '';
        metaEl.textContent = `★ ${data.stargazers_count} • ${data.language || ''} • ${data.default_branch}`;

        // Try to fetch raw README.md from default branch
        const raw = `https://raw.githubusercontent.com/notlousybook/${repo}/${data.default_branch}/README.md`;
        let md = '';
        try{
          const r = await fetch(raw);
          if(r.ok){ md = await r.text(); }
          else { md = '# No README found\n\nView the repository on GitHub for details.'; }
        }catch(e){ md = '# README unavailable'; }

        const html = marked.parse(md || '');
        readmeEl.innerHTML = DOMPurify.sanitize(html);
      }catch(e){
        console.error(e);
        readmeEl.textContent = 'Error loading repository data.';
      }
    }
    loadRepo();
  </script>
</body>
</html>
