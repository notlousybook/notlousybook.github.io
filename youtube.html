<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YouTube — notlousybook</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="container"><a class="logo" href="index.html">notlousybook</a></div></header>
  <main class="container">
    <h1>YouTube</h1>
    <p>Channel: <a href="https://www.youtube.com/@notlousybook" target="_blank" rel="noopener">notlousybook</a></p>
    <p>Subscribe button:</p>
    <div>
      <iframe width="320" height="180" src="https://www.youtube.com/embed?listType=user_uploads&list=notlousybook" frameborder="0" allowfullscreen></iframe>
    </div>
    <p>Video gallery and automatic embeds added below. If you want live updates from the channel, provide a YouTube API key; current implementation uses manual thumbnails and embeds.</p>
    <div id="yt-grid" class="yt-grid"></div>
    <script src="assets/js/config-sample.js"></script>
<script>
(async function(){
  try{
    const res = await fetch('assets/js/config.js',{method:'HEAD'});
    if(res.ok){ var s=document.createElement('script'); s.src='assets/js/config.js'; document.body.appendChild(s); await new Promise(r=>s.onload=r); }
  }catch(e){}
  var s2=document.createElement('script'); s2.src='assets/js/youtube-api.js'; document.body.appendChild(s2);
  s2.onload=function(){
    if(window.YT_API_KEY && window.YT_CHANNEL_ID){ initYouTubeGrid(); } else { var s3=document.createElement('script'); s3.src='assets/js/youtube.js'; document.body.appendChild(s3); console.info('YouTube API key not set; using manual embeds. Copy assets/js/config-sample.js to assets/js/config.js and add keys to enable automatic fetch.'); }
  };
})();
</script>
  </main>
  <footer class="site-footer container">© notlousybook</footer>
</body>
</html>
