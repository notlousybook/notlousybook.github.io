      window.YT_API_KEY = '';
      window.YT_CHANNEL_ID = '';

    <script>if(window.YT_API_KEY && window.YT_CHANNEL_ID){initYouTubeGrid();}else{console.info('YouTube API key not set; leave manual list or set keys in the page.');}</script>
